services:
  postgres:
    image: postgres:16-alpine
    container_name: trackmyrvu-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: trackmyrvu
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: trackmyrvu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackmyrvu"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
